<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Security Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      overflow: hidden;
    }

    #terminal {
      padding: 20px;
      white-space: pre-line;
      font-size: 16px;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% {opacity:1;}
      50% {opacity:0;}
    }

    .glitch {
      color: red;
      font-size: 22px;
      font-weight: bold;
    }

    button {
      display: none;
    }
  </style>
</head>

<body>

<div id="terminal"></div>

<script>
let terminal = document.getElementById("terminal");

let lines = [
  "Connecting to secure banking server...",
  "Access granted ✔",
  "Decrypting data packets...",
  "Injecting payload...",
  "⚠ WARNING: Unauthorized access detected",
  "Bypassing firewall...",
  "Tracking device location...",
  "Accessing camera...",
  "Uploading personal data...",
  "Transfer initiated..."
];

let i = 0;

function typeLine() {
  if (i < lines.length) {
    terminal.innerHTML += lines[i] + "\n";
    i++;
    setTimeout(typeLine, 700);
  } else {
    setTimeout(showPrank, 1500);
  }
}

function showPrank() {
  document.body.style.background = "white";
  document.body.style.color = "black";

  terminal.innerHTML = `
  <div style="text-align:center; padding-top:50px;">
    <h1 style="font-size:50px;">😂 APRIL FOOL 😂</h1>
    <p style="font-size:20px;">Relax bro, nothing was hacked 😏</p>
    <p style="font-size:18px;">You just got pranked!</p>
    <button onclick="location.reload()" style="
      display:block;
      margin:20px auto;
      padding:12px 20px;
      font-size:16px;
      background:black;
      color:white;
      border:none;
      border-radius:10px;
      cursor:pointer;
    ">Try Again</button>
  </div>
  `;
}

typeLine();

// Disable user interaction (fake lock)
document.addEventListener("keydown", e => e.preventDefault());
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("click", e => e.preventDefault());

</script>

</body>
</html>
