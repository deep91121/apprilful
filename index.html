<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SECURITY ALERT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

#terminal {
  padding: 20px;
  white-space: pre-line;
}

.glitch {
  animation: glitch 0.15s infinite;
  color: red;
}

@keyframes glitch {
  0% { transform: translate(2px,-2px); }
  50% { transform: translate(-2px,2px); }
  100% { transform: translate(2px,2px); }
}

#cameraBox {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 180px;
  height: 120px;
  border: 2px solid red;
  display: none;
}

#cameraBox video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#countdown {
  position: fixed;
  bottom: 20px;
  left: 20px;
  font-size: 28px;
  color: red;
}

#fileList {
  position: fixed;
  left: 20px;
  top: 200px;
  color: red;
  font-size: 14px;
}

#callScreen {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.callBox {
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="terminal"></div>
<div id="cameraBox"><video autoplay muted></video></div>
<div id="countdown"></div>
<div id="fileList"></div>

<div id="callScreen">
  <div class="callBox">
    <h2>📞 BANK SECURITY CALL</h2>
    <p>Suspicious Activity Detected</p>
    <button onclick="endCall()" style="background:red;color:white;">Decline</button>
    <button onclick="endCall()" style="background:green;color:white;">Accept</button>
  </div>
</div>

<script>
const terminal = document.getElementById("terminal");
const cameraBox = document.getElementById("cameraBox");
const video = cameraBox.querySelector("video");
const countdownEl = document.getElementById("countdown");
const fileList = document.getElementById("fileList");
const callScreen = document.getElementById("callScreen");

// 🔊 sounds
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
const alarm = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

let lines = [
  "Connecting to secure server...",
  "Access granted ✔",
  "Decrypting database...",
  "⚠ SECURITY BREACH DETECTED",
  "Tracking device...",
  "Location: Guwahati, India",
  "Activating camera...",
  "Accessing personal files..."
];

let i = 0;

function typeLine() {
  if (i < lines.length) {
    terminal.innerHTML += lines[i] + "\n";
    beep.play();
    i++;

    if (i === 4) glitch();
    if (i === 6) fakeCamera();
    if (i === 7) showFiles();

    setTimeout(typeLine, 600);
  } else {
    setTimeout(startCountdown, 2000);
  }
}

// ⚡ glitch
function glitch() {
  document.body.classList.add("glitch");
  setTimeout(() => document.body.classList.remove("glitch"), 2000);
}

// 📸 camera
function fakeCamera() {
  cameraBox.style.display = "block";
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => video.srcObject = stream)
    .catch(() => cameraBox.innerHTML = "Camera blocked");
}

// 🧾 fake files
function showFiles() {
  let files = [
    "photos.jpg",
    "bank_details.pdf",
    "passwords.txt",
    "private_video.mp4"
  ];

  let index = 0;
  let interval = setInterval(() => {
    if (index < files.length) {
      fileList.innerHTML += "Uploading: " + files[index] + "<br>";
      index++;
    } else {
      clearInterval(interval);
      setTimeout(fakeCall, 1000);
    }
  }, 700);
}

// 📱 fake call
function fakeCall() {
  callScreen.style.display = "flex";
}

// end call
function endCall() {
  callScreen.style.display = "none";
  startCountdown();
}

// ⏳ countdown
function startCountdown() {
  let time = 8;
  countdownEl.innerText = "SELF DESTRUCT IN: " + time;

  let timer = setInterval(() => {
    time--;
    countdownEl.innerText = "SELF DESTRUCT IN: " + time;
    beep.play();

    if (time <= 0) {
      clearInterval(timer);
      alarm.play();
      setTimeout(showPrank, 1500);
    }
  }, 1000);
}

// 💣 prank reveal
function showPrank() {
  beep.pause();
  alarm.pause();

  if (video.srcObject) {
    video.srcObject.getTracks().forEach(track => track.stop());
  }

  document.body.style.background = "white";
  document.body.style.color = "black";

  terminal.innerHTML = `
    <div style="text-align:center; padding-top:50px;">
      <h1 style="font-size:50px;">😂 APRIL FOOL 😂</h1>
      <p style="font-size:20px;">Relax... nothing was hacked 😏</p>
      <p>You survived level: INSANE 💀</p>
      <button onclick="location.reload()">Try Again</button>
    </div>
  `;
}

// 🚫 block interaction
document.addEventListener("keydown", e => e.preventDefault());
document.addEventListener("contextmenu", e => e.preventDefault());

typeLine();
</script>

</body>
</html>
