<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security Breach</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

#terminal {
  padding: 20px;
  white-space: pre-line;
}

.glitch {
  animation: glitch 0.2s infinite;
  color: red;
}

@keyframes glitch {
  0% { transform: translate(1px, -1px); }
  50% { transform: translate(-1px, 1px); }
  100% { transform: translate(1px, 1px); }
}

#cameraPopup {
  position: fixed;
  top: 20px;
  right: 20px;
  background: red;
  color: white;
  padding: 10px;
  border-radius: 8px;
  display: none;
}

#countdown {
  position: fixed;
  bottom: 20px;
  left: 20px;
  font-size: 24px;
  color: red;
}
</style>
</head>

<body>

<div id="terminal"></div>
<div id="cameraPopup">📸 Camera Activated</div>
<div id="countdown"></div>

<script>
const terminal = document.getElementById("terminal");
const popup = document.getElementById("cameraPopup");
const countdownEl = document.getElementById("countdown");

// 🔊 Sounds
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
const errorSound = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

let lines = [
  "Initializing secure connection...",
  "Access granted ✔",
  "Decrypting bank server...",
  "Bypassing firewall...",
  "Injecting exploit...",
  "⚠ WARNING: Unauthorized access detected",
  "Tracking IP address...",
  "Location found: Guwahati, India",
  "Accessing camera...",
  "Uploading data to remote server..."
];

let i = 0;

function typeLine() {
  if (i < lines.length) {
    terminal.innerHTML += lines[i] + "\n";
    beep.play();
    i++;

    // trigger effects
    if (i === 6) glitchEffect();
    if (i === 8) popup.style.display = "block";
    if (i === 9) startCountdown();

    setTimeout(typeLine, 700);
  } else {
    setTimeout(showPrank, 5000);
  }
}

// ⚡ glitch
function glitchEffect() {
  document.body.classList.add("glitch");
  setTimeout(() => document.body.classList.remove("glitch"), 2000);
}

// ⏳ countdown
function startCountdown() {
  let time = 10;
  countdownEl.innerText = "Data wipe in: " + time;

  let timer = setInterval(() => {
    time--;
    countdownEl.innerText = "Data wipe in: " + time;
    beep.play();

    if (time <= 0) {
      clearInterval(timer);
      errorSound.play();
    }
  }, 1000);
}

// 💥 reveal
function showPrank() {
  document.body.style.background = "white";
  document.body.style.color = "black";

  terminal.innerHTML = `
    <div style="text-align:center; padding-top:50px;">
      <h1 style="font-size:50px;">😂 APRIL FOOL 😂</h1>
      <p style="font-size:20px;">Relax bro... nothing was hacked 😏</p>
      <p style="font-size:18px;">You really panicked huh? 💀</p>
      <button onclick="location.reload()" style="
        padding:12px 20px;
        font-size:16px;
        background:black;
        color:white;
        border:none;
        border-radius:10px;
        cursor:pointer;
      ">Try Again</button>
    </div>
  `;
}

// 🚫 disable interaction
document.addEventListener("keydown", e => e.preventDefault());
document.addEventListener("click", e => e.preventDefault());
document.addEventListener("contextmenu", e => e.preventDefault());

typeLine();
</script>

</body>
</html>
