<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security Breach</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

#terminal {
  padding: 20px;
  white-space: pre-line;
}

.glitch {
  animation: glitch 0.15s infinite;
  color: red;
}

@keyframes glitch {
  0% { transform: translate(2px,-2px); }
  50% { transform: translate(-2px,2px); }
  100% { transform: translate(2px,2px); }
}

#cameraBox {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 180px;
  height: 120px;
  background: black;
  border: 2px solid red;
  display: none;
  overflow: hidden;
}

#cameraBox video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#countdown {
  position: fixed;
  bottom: 20px;
  left: 20px;
  font-size: 26px;
  color: red;
  font-weight: bold;
}

#fileBar {
  position: fixed;
  bottom: 80px;
  left: 20px;
  width: 300px;
  height: 10px;
  background: #222;
  display: none;
}

#fileProgress {
  height: 100%;
  width: 0%;
  background: red;
}
</style>
</head>

<body>

<div id="terminal"></div>
<div id="cameraBox"><video autoplay muted></video></div>
<div id="countdown"></div>

<div id="fileBar">
  <div id="fileProgress"></div>
</div>

<script>
const terminal = document.getElementById("terminal");
const cameraBox = document.getElementById("cameraBox");
const video = cameraBox.querySelector("video");
const countdownEl = document.getElementById("countdown");
const fileBar = document.getElementById("fileBar");
const fileProgress = document.getElementById("fileProgress");

// 🔊 Sounds (will STOP later)
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
const alarm = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

let lines = [
  "Connecting to banking server...",
  "Access granted ✔",
  "Decrypting database...",
  "Injecting exploit...",
  "⚠ SECURITY BREACH DETECTED",
  "Tracking device...",
  "Location found: Guwahati, India",
  "Activating camera...",
  "Accessing files...",
  "Uploading data..."
];

let i = 0;

function typeLine() {
  if (i < lines.length) {
    terminal.innerHTML += lines[i] + "\n";
    beep.play();
    i++;

    if (i === 5) glitch();
    if (i === 7) fakeCamera();
    if (i === 8) startCountdown();
    if (i === 9) startFileTransfer();

    setTimeout(typeLine, 600);
  } else {
    setTimeout(showPrank, 6000);
  }
}

// ⚡ glitch
function glitch() {
  document.body.classList.add("glitch");
  setTimeout(() => document.body.classList.remove("glitch"), 2000);
}

// 📸 FAKE CAMERA (realistic but safe)
function fakeCamera() {
  cameraBox.style.display = "block";

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      video.srcObject = stream;
    })
    .catch(() => {
      cameraBox.innerHTML = "Camera Access Failed";
    });
}

// ⏳ countdown
function startCountdown() {
  let time = 10;
  countdownEl.innerText = "System wipe in: " + time;

  let timer = setInterval(() => {
    time--;
    countdownEl.innerText = "System wipe in: " + time;
    beep.play();

    if (time <= 0) {
      clearInterval(timer);
      alarm.play();
    }
  }, 1000);
}

// 📁 fake file transfer
function startFileTransfer() {
  fileBar.style.display = "block";
  let progress = 0;

  let interval = setInterval(() => {
    progress += 10;
    fileProgress.style.width = progress + "%";

    if (progress >= 100) clearInterval(interval);
  }, 500);
}

// 💥 APRIL FOOL (NO SOUND AFTER THIS)
function showPrank() {
  // STOP ALL SOUNDS
  beep.pause();
  alarm.pause();

  // STOP CAMERA
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(track => track.stop());
  }

  document.body.style.background = "white";
  document.body.style.color = "black";

  terminal.innerHTML = `
    <div style="text-align:center; padding-top:50px;">
      <h1 style="font-size:50px;">😂 APRIL FOOL 😂</h1>
      <p style="font-size:20px;">Relax... nothing was hacked 😏</p>
      <p style="font-size:18px;">You survived the fake hack 💀</p>
      <button onclick="location.reload()" style="
        padding:12px 20px;
        font-size:16px;
        background:black;
        color:white;
        border:none;
        border-radius:10px;
        cursor:pointer;
      ">Try Again</button>
    </div>
  `;
}

// 🚫 block interaction (but still safe)
document.addEventListener("keydown", e => e.preventDefault());
document.addEventListener("contextmenu", e => e.preventDefault());

typeLine();
</script>

</body>
</html>
